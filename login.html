<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MineSlope Monitor</title>
    <meta name="description" content="Secure sign-in to access your dashboard." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ---------- Base ---------- */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        color: #f5f7ff;
        background: #0b0f1c;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* ---------- Animated gradient background ---------- */
      .bg {
        position: fixed;
        inset: 0;
        background:url(Mine.jpg);
        background-size: 100% 100%;
        /* animation: gradientShift 18s ease infinite; */
        z-index: -2;
      }
      .blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.55;
        z-index: -1;
        animation: float 14s ease-in-out infinite;
      }
      .blob.b1 {
        width: 420px;
        height: 420px;
        background: #6366f1;
        top: -120px;
        left: -120px;
      }
      .blob.b2 {
        width: 380px;
        height: 380px;
        background: #06b6d4;
        bottom: -140px;
        right: -100px;
        animation-delay: -6s;
      }
      .blob.b3 {
        width: 300px;
        height: 300px;
        background: #ec4899;
        top: 40%;
        left: 55%;
        opacity: 0.35;
        animation-delay: -3s;
      }
      @keyframes gradientShift {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }
      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(30px, -40px) scale(1.08);
        }
      }

      /* ---------- Layout ---------- */
      main {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        overflow-y: auto;
      }

      /* ---------- Glass card ---------- */
      .card {
        width: 100%;
        max-width: 420px;
        padding: 40px 32px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(24px) saturate(140%);
        -webkit-backdrop-filter: blur(24px) saturate(140%);
        box-shadow:
          0 20px 60px -20px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
        animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
      }
      .logo {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: linear-gradient(135deg, #818cf8, #22d3ee);
        display: grid;
        place-items: center;
        box-shadow: 0 8px 24px -8px rgba(129, 140, 248, 0.7);
      }
      .logo svg {
        width: 22px;
        height: 22px;
        color: #0b0f1c;
      }
      .brand-name {
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .sub {
        margin: 0 0 28px;
        color: rgba(226, 232, 240, 0.7);
        font-size: 14px;
      }

      /* ---------- Form ---------- */
      .field {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 8px;
        color: rgba(226, 232, 240, 0.85);
      }
      .input-wrap {
        position: relative;
      }
      input {
        width: 100%;
        padding: 13px 14px;
        font: inherit;
        font-size: 15px;
        color: #f8fafc;
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          background 0.2s;
      }
      input::placeholder {
        color: rgba(148, 163, 184, 0.6);
      }
      input:focus {
        border-color: #818cf8;
        background: rgba(15, 23, 42, 0.7);
        box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.18);
      }
      .input-wrap.has-toggle input {
        padding-right: 46px;
      }
      .toggle {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        background: transparent;
        border: 0;
        border-radius: 8px;
        color: rgba(226, 232, 240, 0.7);
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .toggle:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #f8fafc;
      }
      .toggle svg {
        width: 18px;
        height: 18px;
      }

      /* ---------- Error ---------- */
      .error {
        margin: 4px 0 12px;
        padding: 10px 12px;
        font-size: 13px;
        color: #fecaca;
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.35);
        border-radius: 10px;
        display: none;
        animation: shake 0.4s;
      }
      .error.show {
        display: block;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-6px);
        }
        75% {
          transform: translateX(6px);
        }
      }

      /* ---------- Button ---------- */
      .btn {
        width: 100%;
        margin-top: 8px;
        padding: 13px 16px;
        font: inherit;
        font-size: 15px;
        font-weight: 600;
        color: #0b0f1c;
        background: linear-gradient(135deg, #a5b4fc, #67e8f9);
        border: 0;
        border-radius: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition:
          transform 0.15s,
          box-shadow 0.2s,
          opacity 0.2s;
        box-shadow: 0 10px 30px -12px rgba(103, 232, 249, 0.6);
      }
      .btn:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 14px 34px -12px rgba(103, 232, 249, 0.75);
      }
      .btn:active:not(:disabled) {
        transform: translateY(0);
      }
      .btn:disabled {
        opacity: 0.75;
        cursor: not-allowed;
      }
      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(11, 15, 28, 0.25);
        border-top-color: #0b0f1c;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: none;
      }
      .btn.loading .spinner {
        display: block;
      }
      .btn.loading .btn-text {
        opacity: 0.85;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .hint {
        margin-top: 20px;
        text-align: center;
        font-size: 12px;
        color: rgba(148, 163, 184, 0.75);
      }
      .hint code {
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 6px;
        border-radius: 5px;
        font-size: 11.5px;
      }

      @media (max-width: 420px) {
        .card {
          padding: 32px 22px;
        }
        h1 {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <div class="blob b1" aria-hidden="true"></div>
    <div class="blob b2" aria-hidden="true"></div>
    <div class="blob b3" aria-hidden="true"></div>

    <main>
      <section class="card" role="region" aria-labelledby="title">
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 2 3 7l9 5 9-5-9-5z" />
              <path d="m3 17 9 5 9-5" />
              <path d="m3 12 9 5 9-5" />
            </svg>
          </div>
          <span class="brand-name">Slope Dashboard</span>
        </div>

        <h1 id="title">Welcome back</h1>
        <p class="sub">Sign in to continue to your dashboard.</p>

        <form id="loginForm" novalidate>
          <div class="field">
            <label for="username">Username</label>
            <div class="input-wrap">
              <input
                id="username"
                name="username"
                type="text"
                autocomplete="username"
                placeholder="Enter your username"
                required
              />
            </div>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap has-toggle">
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="Enter your password"
                required
              />
              <button type="button" class="toggle" id="togglePwd" aria-label="Show password">
                <svg
                  id="eyeIcon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="error" id="error" role="alert" aria-live="polite"></div>

          <button type="submit" class="btn" id="submitBtn">
            <span class="spinner" aria-hidden="true"></span>
            <span class="btn-text">Sign in</span>
          </button>
        </form>

        <!-- <p class="hint">
          Demo credentials: <code>admin</code> / <code>admin123</code>
        </p> -->
      </section>
    </main>

    <script>
      // ==========================================
      // CONFIG
      // ==========================================

      const API_URL =
        "https://script.google.com/macros/s/AKfycbyijXouQoxkmswCqYHpbSeS4p45bp_hBa8zyRucQGWjDoUMxVl2ejBRnLiIIEG5KCjf/exec";

      const AUTH_KEY = "auth.isLoggedIn";
      const AUTH_USER_KEY = "auth.username";

      // ==========================================
      // AUTO LOGIN CHECK
      // ==========================================

      if (localStorage.getItem(AUTH_KEY) === "true") {
        window.location.replace("dashboard1.html");
      }
      localStorage.setItem(
  "auth.loginTime",
  Date.now()
);

      // ==========================================
      // PASSWORD TOGGLE
      // ==========================================

      const pwd = document.getElementById("password");
      const toggle = document.getElementById("togglePwd");
      const eyeIcon = document.getElementById("eyeIcon");

      const EYE = `
    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
    <circle cx="12" cy="12" r="3"/>
  `;

      const EYE_OFF = `
    <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-10-7-10-7a19.6 19.6 0 0 1 4.22-5.19"/>
    <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 10 7 10 7a19.5 19.5 0 0 1-3.17 4.19"/>
    <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
    <line x1="2" y1="2" x2="22" y2="22"/>
  `;

      toggle.addEventListener("click", () => {
        const showing = pwd.type === "text";

        pwd.type = showing ? "password" : "text";

        toggle.setAttribute("aria-label", showing ? "Show password" : "Hide password");

        eyeIcon.innerHTML = showing ? EYE : EYE_OFF;
      });

      // ==========================================
      // FORM ELEMENTS
      // ==========================================

      const form = document.getElementById("loginForm");
      const btn = document.getElementById("submitBtn");
      const errorEl = document.getElementById("error");

      function showError(message) {
        errorEl.textContent = message;
        errorEl.classList.add("show");
      }

      function clearError() {
        errorEl.classList.remove("show");
        errorEl.textContent = "";
      }

      document.getElementById("username").addEventListener("input", clearError);

      document.getElementById("password").addEventListener("input", clearError);

      // ==========================================
      // LOGIN
      // ==========================================

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        clearError();

        const username = document.getElementById("username").value.trim();

        const password = document.getElementById("password").value.trim();

        if (!username || !password) {
          showError("Please enter username and password.");

          return;
        }

        btn.disabled = true;
        btn.classList.add("loading");

        try {
          const response = await fetch(
            `${API_URL}?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`,
          );

          const result = await response.json();

          if (result.success === true) {
            localStorage.setItem(AUTH_KEY, "true");

            localStorage.setItem(AUTH_USER_KEY, result.username || username);

            window.location.replace("dashboard1.html");

            return;
          }

          showError("Invalid username or password.");

          pwd.value = "";
          pwd.focus();
        } catch (error) {
          console.error(error);

          showError("Unable to connect to authentication server.");
        }

        btn.disabled = false;
        btn.classList.remove("loading");
      });
    </script>
  </body>
</html>
